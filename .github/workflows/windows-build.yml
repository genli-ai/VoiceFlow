name: Windows Build

on:
  push:
    branches: [main, "windows*"]
    paths:
      - "MicTypeWindows/**"
      - ".github/workflows/windows-build.yml"
  pull_request:
    paths:
      - "MicTypeWindows/**"
      - ".github/workflows/windows-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MicTypeWindows/src/MicType.Windows/MicType.Windows.csproj

      - name: Build (Debug)
        run: dotnet build MicTypeWindows/src/MicType.Windows/MicType.Windows.csproj -c Debug --no-restore

      - name: Test
        run: |
          if (Test-Path "MicTypeWindows/tests") {
            dotnet test MicTypeWindows/tests -c Debug
          } else {
            Write-Host "No tests yet - skipping"
          }
        shell: pwsh

      - name: Publish (win-x64, self-contained)
        run: >
          dotnet publish MicTypeWindows/src/MicType.Windows/MicType.Windows.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o MicTypeWindows/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicType-windows-x64
          path: MicTypeWindows/publish/
          retention-days: 30

  sensevoice-integration:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache SenseVoice model
        uses: actions/cache@v4
        with:
          path: MicTypeWindows/.model-cache/sensevoice
          key: sensevoice-${{ runner.os }}-sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17-v1

      - name: Restore tests
        run: dotnet restore MicTypeWindows/tests/MicTypeWindows.Tests.sln

      - name: SenseVoice real transcription test
        shell: pwsh
        env:
          MICTYPE_RUN_SENSEVOICE_INTEGRATION: "1"
          MICTYPE_SENSEVOICE_MODEL_DIR: ${{ github.workspace }}\MicTypeWindows\.model-cache\sensevoice
        run: >
          dotnet test MicTypeWindows/tests/MicTypeWindows.Tests.sln
          -c Debug
          --filter FullyQualifiedName~SenseVoiceIntegrationTests
          --logger "console;verbosity=normal"
